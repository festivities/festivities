name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - name: Recent activity
        uses: festivities/metrics@master
        with:
          filename: metrics.plugin.activity.svg
          token: ${{ secrets.FESTIVITIES_METRICS }}
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue, pr, release, fork, review, ref/create
          delay: 120
          retries: 3
          retries_delay: 300
          user: festivities
          plugins_errors_fatal: yes
